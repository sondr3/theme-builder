name: pipeline

on: [push, pull_request]

jobs:
  pipeline:
    name: pipeline
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4.4.0
      - uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: 'pnpm'

      - name: Install and build
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Check
        run: pnpm check

      - name: Build
        run: pnpm build
